<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>

    body {
      background-color: #0f172a;
      color: #f1f5f9;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      box-sizing: border-box;
    }

    .terminal-container {
      width: 100%;
      max-width: 900px;
      height: 80vh;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    #terminal {
      display: flex;
      flex-direction: column;
    }

    .history-entry {
      margin-bottom: 10px;
      animation: fadeIn 0.2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .prompt {
      color: #4ade80;
      font-weight: bold;
      margin-right: 8px;
    }

    .output {
      margin-left: 20px;
      color: #94a3b8;
      border-left: 2px solid #334155;
      padding-left: 15px;
      margin-top: 5px;
      margin-bottom: 15px;
    }

    .output-header {
      color: #38bdf8;
      font-weight: bold;
      margin-top: 10px;
    }

    .error {
      color: #f87171;
    }

    .input-line {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    input {
      background: transparent;
      border: none;
      color: #f1f5f9;
      font-family: inherit;
      font-size: 1rem;
      flex-grow: 1;
      outline: none;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Custom Scrollbar */
    .terminal-container::-webkit-scrollbar {
      width: 8px;
    }
    .terminal-container::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  
</body>
</html>
